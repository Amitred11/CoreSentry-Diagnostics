frontend:
  - changed-files:
    - any-glob-to-any-file: 'src/frontend/**/*'
    - any-glob-to-any-file: 'public/**/*'

backend:
  - changed-files:
    - any-glob-to-any-file: 'src/backend/**/*'
    - any-glob-to-any-file: 'api/**/*'

ui:
  - changed-files:
    - any-glob-to-any-file: 'src/components/**/*'
    - any-glob-to-any-file: 'src/styles/**/*'

telemetry:
  - changed-files:
    - any-glob-to-any-file: 'src/telemetry/**/*'
    - any-glob-to-any-file: 'src/metrics/**/*'

diagnostics:
  - changed-files:
    - any-glob-to-any-file: 'src/diagnostics/**/*'
    - any-glob-to-any-file: 'logs/**/*'

documentation:
  - changed-files:
    - any-glob-to-any-file: 'docs/**/*'
    - any-glob-to-any-file: '**/*.md'

ci:
  - changed-files:
    - any-glob-to-any-file: '.github/workflows/**/*'

tests:
  - changed-files:
    - any-glob-to-any-file: '**/*.test.ts'
    - any-glob-to-any-file: '**/*.spec.ts'
    - any-glob-to-any-file: 'tests/**/*'