name: PR Intelligence Assistant

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  labeler:
    name: Resource Auto Labeling
    runs-on: ubuntu-latest
    steps:
      - name: Label Source Content
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml

  summarize-and-assist:
    name: Generate Summary and Evaluate Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Generate the AI/Structured summary report
      - name: Extract Branch Diff Analysis
        id: summary
        run: |
          node scripts/summarize-pr.js > pr_summary.txt
          cat pr_summary.txt

      - name: Post Markdown Analysis Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryBody = fs.readFileSync('pr_summary.txt', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existingSummary = comments.find(c => c.body.includes("## Pull Request Automated Summary"));

            if (existingSummary) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingSummary.id,
                body: summaryBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summaryBody
              });
            }

      # Readiness evaluations and smart recommendations
      - name: Assess Readiness and Recommendations
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // Gather check status
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });

            const allChecksPass = checks.check_runs.every(run => 
              run.status === 'completed' && (run.conclusion === 'success' || run.name === 'Generate Summary and Evaluate Readiness')
            );

            // Determine change size metrics
            const additions = pr.additions;
            const deletions = pr.deletions;
            const totalChanges = additions + deletions;
            const isSmallRisk = totalChanges <= 50;

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const isDocsOnly = files.every(f => f.filename.endsWith('.md') || f.filename.includes('docs/'));

            // Check merge conflicts
            const isMergeable = pr.mergeable !== false;

            if (allChecksPass && isMergeable) {
              // Mark ready-for-review
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['ready-for-review']
              });

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });

              if (!comments.some(c => c.body.includes("Ready For Maintainer Review"))) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: "🟢 **Ready For Maintainer Review**\nAll automated pipeline checks have validated this change. No technical conflicts are reported."
                });
              }

              // Recommend for approval condition logic
              if (isDocsOnly || isSmallRisk) {
                if (!comments.some(c => c.body.includes("Recommended For Approval"))) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: "👉 **Recommended For Approval**\nThis PR meets approval criteria: either restricted purely to documentation updates, or carries minor modifications code-wise."
                  });
                }
              }
            } else if (!isMergeable) {
              // Post conflict notice
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });

              if (!comments.some(c => c.body.includes("Merge Conflict Detected"))) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: "⚠️ **Merge Conflict Detected**\nThis branch cannot be merged. Please rebase against target branch to resume review process."
                });
              }
            }

  welcome-and-thank:
    name: Contributor Relations
    runs-on: ubuntu-latest
    steps:
      - name: Welcome First-Time Contributors
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // Get count of previous PRs by contributor
            const { data: userPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: pr.user.login
            });

            if (userPrs.length <= 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `👋 **Welcome, @${pr.user.login}!** Thank you for proposing your first change to our repository!
Please inspect our [Contribution Guidelines](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/AUTOMATION_GUIDE.md) before maintainers begin code review. We appreciate your input!`
              });
            }

  thank-on-merge:
    name: Thank Contributor on Close
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Post Merged Appreciation Comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🎉 **Successfully Merged!** Thank you @${pr.user.login} for your contribution to this codebase! Your changes are now applied to our development path.`
            });