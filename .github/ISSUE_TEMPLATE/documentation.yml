name: "📝 Documentation Issue"
description: "Report missing or inaccurate documentation."
labels: ["documentation"]
body:
  - type: textarea
    id: missing-content
    attributes:
      label: "Missing or Incorrect Content"
      placeholder: "Describe what is missing or wrong in the docs."
    validations:
      required: true
  - type: textarea
    id: suggested-improvement
    attributes:
      label: "Suggested Improvement"
      placeholder: "How can we make this better?"
    validations:
      required: true