name: Release Automation Engine

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile and Bundle Production Assets
        run: |
          npm ci || npm install
          npm run build || echo "Production assets not configured"
          tar -czf release-bundle.tar.gz dist/ || echo "Compilation packaging skipped"

      - name: Generate Automated Changelog Notes
        id: change_notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: releaseNotes } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: 'main'
            });
            core.setOutput('notes', releaseNotes.body);

      - name: Create Versioned GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.change_notes.outputs.notes }}
          files: |
            release-bundle.tar.gz
          draft: false
          prerelease: false