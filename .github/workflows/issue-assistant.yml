name: Issue Quality & Routing Automation

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install actions toolkit dependencies
        run: npm install @actions/github @actions/core

      - name: Process Quality and Duplicate Verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/issue-assistant.js

      - name: Categorical Auto Labeler
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const body = (issue.body || '').toLowerCase();
            const labels = [];

            if (body.includes('security') || body.includes('vulnerability') || body.includes('exploit')) {
              labels.push('security');
            }
            if (body.includes('documentation') || body.includes('docs')) {
              labels.push('documentation');
            }
            if (body.includes('feature') || body.includes('enhance')) {
              labels.push('enhancement');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }